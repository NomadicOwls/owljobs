name = "owljobs-discover"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Secrets (set via `wrangler secret put` — values NOT stored in this file):
# DISCOVER_SECRET           — Authorization: Bearer token for POST /probe
# SUPABASE_URL              — Supabase project URL
# SUPABASE_SERVICE_ROLE_KEY — Bypasses RLS; required for global public.candidates table
#
# Run once per environment (inside workers/discover/):
#   wrangler secret put DISCOVER_SECRET
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY
#
# For local dev, create workers/discover/.dev.vars:
#   DISCOVER_SECRET=<random-32-char-string>
#   SUPABASE_URL=https://<ref>.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY=<service_role_key>

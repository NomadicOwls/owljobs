name = "owljobs-digest"
main = "src/index.ts"
compatibility_date = "2025-04-08"
compatibility_flags = ["nodejs_compat"]

# Crons:
#   "0 6 * * 1" — Monday 06:00 UTC — weekly subscriber digest (CAND-01)
#   "0 8 * * 1" — Monday 08:00 UTC — weekly employer match alerts (ANLYT-02, Phase 4)
# scheduled() handler branches on event.cron to pick the right producer.
[triggers]
crons = ["0 6 * * 1", "0 8 * * 1"]

# Queue — create once with:
#   wrangler queues create owljobs-digest
[[queues.producers]]
queue = "owljobs-digest"
binding = "DIGEST_QUEUE"

[[queues.consumers]]
queue = "owljobs-digest"
# max_batch_size = 1 because each message body already carries up to 10 subscriber
# IDs (D-15). One consumer invocation = one Resend batch call (<= 10 emails).
# Resolves RESEARCH Conflict 1 vs CLAUDE.md's "max_batch_size: 2 or lower" guidance.
max_batch_size = 1
max_batch_timeout = 0
max_retries = 2
# WR-02: messages that exhaust max_retries are routed here instead of dropped.
# Create once with: wrangler queues create owljobs-digest-dlq
dead_letter_queue = "owljobs-digest-dlq"

# ─── Phase 4 ANLYT-02: employer match alerts ─────────────────────────────
# Create queues once with:
#   wrangler queues create owljobs-employer-alerts
#   wrangler queues create owljobs-employer-alerts-dlq
[[queues.producers]]
queue = "owljobs-employer-alerts"
binding = "EMPLOYER_ALERTS"

[[queues.consumers]]
queue = "owljobs-employer-alerts"
max_batch_size = 5
max_batch_timeout = 5
max_retries = 2
dead_letter_queue = "owljobs-employer-alerts-dlq"

# Secrets — set via wrangler secret put (from workers/digest/):
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_SERVICE_KEY
#   wrangler secret put BREVO_API_KEY      # both subscriber digest and employer alerts
#
# For local dev, create workers/digest/.dev.vars:
#   SUPABASE_URL=https://<ref>.supabase.co
#   SUPABASE_SERVICE_KEY=<service_role_key>
#   BREVO_API_KEY=<brevo_api_key>

name = "owljobs-ingest"
main = "src/index.ts"
compatibility_date = "2025-04-08"
compatibility_flags = ["nodejs_compat"]

# Cron: run every hour
[triggers]
crons = ["0 * * * *"]

[ai]
binding = "AI"

# Queues — create once with:
#   wrangler queues create owljobs-classify
#   wrangler queues create owljobs-enrich
[[queues.producers]]
queue = "owljobs-classify"
binding = "CLASSIFY_QUEUE"

[[queues.producers]]
queue = "owljobs-enrich"
binding = "ENRICH_QUEUE"

[[queues.consumers]]
queue = "owljobs-classify"
max_batch_size = 2
max_batch_timeout = 0
max_retries = 2

[[queues.consumers]]
queue = "owljobs-enrich"
max_batch_size = 2
max_batch_timeout = 0
max_retries = 2

# Supabase credentials — set as secrets, never in plaintext here.
# Run once per environment:
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_SERVICE_KEY
#
# For local dev, create workers/ingest/.dev.vars:
#   SUPABASE_URL=https://<ref>.supabase.co
#   SUPABASE_SERVICE_KEY=<service_role_key>

# Google Indexing API service-account JSON — set as a Worker secret, never in plaintext.
# Used by src/google-indexing.ts to ping URL_UPDATED on stale-job expiry (CONTEXT D-08, D-09).
# This is a WORKER secret on owljobs-ingest, NOT a Cloudflare Pages secret
# (Pages secrets list is in apps/web/src/lib/env.ts; Indexing API runs in this Worker).
#
# Run once per environment:
#   wrangler secret put GOOGLE_INDEXING_KEY
# (Paste the entire downloaded service-account JSON when prompted.)
#
# For local dev, append to workers/ingest/.dev.vars:
#   GOOGLE_INDEXING_KEY={"client_email":"...","private_key":"-----BEGIN PRIVATE KEY-----\\n...","token_uri":"https://oauth2.googleapis.com/token"}

# Adzuna + JSearch aggregator credentials (Phase 2, COVG-03).
# Aggregators fill coverage gaps for employers without native ATS adapters.
#
# Adzuna: register at https://developer.adzuna.com — free tier sufficient for v1.
#   wrangler secret put ADZUNA_APP_ID
#   wrangler secret put ADZUNA_APP_KEY
#
# JSearch (RapidAPI): subscribe at https://rapidapi.com/letscrape-6bRBa3QguO5/api/jsearch — Basic tier (~150-200 req/mo).
#   wrangler secret put JSEARCH_API_KEY
#
# For local dev append to workers/ingest/.dev.vars:
#   ADZUNA_APP_ID=...
#   ADZUNA_APP_KEY=...
#   JSEARCH_API_KEY=...

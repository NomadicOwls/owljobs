name = "owljobs-web"
compatibility_date = "2025-04-08"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# Secrets (set via `wrangler pages secret put <KEY>` per environment):
#   SUPABASE_URL
#   SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_KEY
#   RESEND_API_KEY
#   TURNSTILE_SECRET_KEY
#   TURNSTILE_SITE_KEY
#
# For local dev, create apps/web/.dev.vars with the above values.

# Analytics Engine — Phase 4 ANLYT-01 (D-09)
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "owljobs_events"

# Phase 4 Pages secrets (set with: wrangler pages secret put <NAME> --project-name owljobs-web):
# - CF_ACCOUNT_ID         (32-hex Cloudflare account id; used by /api/stats)
# - CF_API_TOKEN          (token with Analytics Engine Read; used by /api/stats)
# - LOGODEV_TOKEN         (publishable; used by EmployerLogo on logo.dev URL)
